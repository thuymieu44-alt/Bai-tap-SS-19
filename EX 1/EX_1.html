<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./CSS_1.css">
</head>

<body>
    <h1>Register</h1>
    <form>
        <div>
            <label for="email">Email:</label>
            <input id="email" type="email" placeholder="Enter your email address">
        </div>
        <div>
            <label for="password">Password:</label>
            <input class="password" type="password" placeholder="Enter your password">
        </div>
        <div>
            <label for="conf-password">Confirm Password:</label>
            <input class="conf-password" type="password" placeholder="Enter your confirm password">
        </div>
        <div>
            <button class="btn">Register</button>
        </div>
    </form>
    <script src="./JS_1.js"></script>
</body>

</html>
