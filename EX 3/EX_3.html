<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./CSS_3.css">
</head>
<body>
    <form id="form" class="login-container">
        <h2>Login</h2>
        <div class="input-gr">
            <label for="email">Email:</label>
            <input type="email" name="email" id="inp-email" placeholder="Enter your email address"/>
            <small class="error error-email"></small>
        </div>
         <div class="input-gr password-inp">
            <label for="password">Password:</label>
            <div class="relative">
            <input type="password" name="password" id="inp-pass" placeholder="Enter your password"/>
            <span class="toggle-password"><i class="fa-solid fa-eye show-password"></i> </span>
            </div>
            <small class="error error-password"></small>
        </div>
        <button class="btn-log">Login</button>
        <div class="extra-links">
            <a href="#">Forgot password?</a>
            <span>or</span>
            <a href="#">SignUp</a>
        </div>
    </form>
    <script src="./JS_3.js"></script>
</body>
</html>
